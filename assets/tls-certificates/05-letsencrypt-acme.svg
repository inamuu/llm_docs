<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Let's EncryptとACME</title>
  <desc id="desc">ACMEクライアントがドメイン所有を証明し、Let's Encryptから証明書を受け取り、自動更新する流れ。</desc>
  <style>
    .bg{fill:#f7f8f4}.box{fill:#fff;stroke:#1f3a3d;stroke-width:4;rx:18}.ca{fill:#e5f3df}.dns{fill:#fff6d8}.srv{fill:#eaf2f8}.line{stroke:#1f3a3d;stroke-width:5;fill:none;marker-end:url(#arrow)}.title{font:700 42px sans-serif;fill:#1f3a3d}.label{font:700 28px sans-serif;fill:#1f3a3d}.text{font:22px sans-serif;fill:#52666a}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#1f3a3d"/></marker></defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="80" y="82">Let's Encryptは発行を自動化した公開CA</text>
  <rect class="box srv" x="80" y="170" width="270" height="140"/>
  <text class="label" x="120" y="230">自分のサーバー</text>
  <text class="text" x="120" y="265">ACMEクライアント</text>
  <rect class="box dns" x="465" y="170" width="270" height="140"/>
  <text class="label" x="515" y="230">ドメイン確認</text>
  <text class="text" x="505" y="265">HTTP-01 / DNS-01</text>
  <rect class="box ca" x="850" y="170" width="270" height="140"/>
  <text class="label" x="920" y="230">Let's Encrypt</text>
  <text class="text" x="910" y="265">証明書を発行</text>
  <path class="line" d="M355 240 L455 240"/>
  <path class="line" d="M740 240 L840 240"/>
  <path class="line" d="M980 315 C980 470, 650 570, 350 520"/>
  <text class="label" x="260" y="530">短い有効期限を前提に自動更新する</text>
  <text class="text" x="260" y="570">手作業の更新忘れを、仕組みで減らす</text>
</svg>
